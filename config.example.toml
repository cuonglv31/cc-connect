# =============================================================================
# Cấu hình cc-connect Toàn cầu
# =============================================================================

# Ngôn ngữ cho thông báo của bot: "en" hoặc để trống "" để tự động nhận diện
# language = "en"

# Thư mục lưu trữ dữ liệu phiên (mặc định: ~/.cc-connect)
# Lưu lịch sử hội thoại và trạng thái dưới dạng file JSON.
# data_dir = "/path/to/custom/dir"

# Công tắc gửi ngược tệp đính kèm cho lệnh `cc-connect send --image/--file`.
# Nếu đặt là "off", bot sẽ không gửi trả tệp về ứng dụng nhắn tin (IM).
# attachment_send = "on"

# Chế độ im lặng mặc định (ẩn các tin nhắn suy nghĩ/tiến trình của công cụ)
# Có thể ghi đè tùy dự án. Người dùng có thể chuyển đổi bằng lệnh /quiet.
# quiet = true

[log]
level = "info" # Các mức: debug, info, warn, error

# =============================================================================
# Cài đặt Hiển thị
# =============================================================================

[display]
thinking_max_len = 300  # Số ký tự tối đa cho tin nhắn suy nghĩ (0 = không giới hạn)
tool_max_len = 500      # Số ký tự tối đa cho tin nhắn gọi công cụ

# Thời gian chờ Agent (phút): Nếu quá thời gian này không có phản hồi, phiên bị coi là treo.
idle_timeout_mins = 120 

# =============================================================================
# Xem trước Luồng dữ liệu (Streaming Preview)
# =============================================================================
# Cập nhật nội dung tin nhắn theo thời gian thực (hiệu ứng "đang gõ").
# Hỗ trợ: Telegram, Discord và Feishu.

[stream_preview]
enabled = true           # Bật/Tắt xem trước (mặc định: true)
interval_ms = 1500       # Khoảng thời gian tối thiểu giữa các lần cập nhật (ms)
min_delta_chars = 30     # Số ký tự mới tối thiểu để cập nhật tin nhắn
max_chars = 2000         # Độ dài xem trước tối đa

# =============================================================================
# Giới hạn Tốc độ (Rate Limiting)
# =============================================================================
# Ngăn chặn người dùng spam bot.

[rate_limit]
max_messages = 20        # Số tin nhắn tối đa trong một cửa sổ thời gian
window_secs = 60         # Thời gian cửa sổ tính bằng giây

# =============================================================================
# Webhook (Điểm cuối HTTP bên ngoài)
# =============================================================================
# Cho phép Git hooks, CI/CD hoặc các hệ thống khác kích hoạt Agent.

[webhook]
enabled = false
port = 9111
token = "your-secret-token" # Token bảo mật để xác thực
path = "/hook"

# =============================================================================
# Quản lý API & Bridge (Cho Dashboards/GUI bên ngoài)
# =============================================================================

[management]
enabled = false
port = 9820
token = "your-mgmt-secret"

[bridge]
enabled = false
port = 9810
token = "your-bridge-secret"

# =============================================================================
# Chuyển đổi Giọng nói (STT & TTS) - Yêu cầu cài đặt ffmpeg
# =============================================================================

[speech]
enabled = false
provider = "openai" # "openai", "groq", hoặc "qwen"
# api_key = "sk-xxx"

[tts]
enabled = false
provider = "qwen"
voice = "Cherry"
tts_mode = "voice_only" # "voice_only" (chỉ khi người dùng gửi thoại) hoặc "always"

# =============================================================================
# Lệnh Tùy chỉnh (Slash Commands)
# =============================================================================

[[commands]]
name = "finduser"
description = "Tìm kiếm thông tin người dùng"
prompt = "Tìm trong cơ sở dữ liệu người dùng「{{1}}」và trả về chi tiết đăng ký."

[[commands]]
name = "review"
description = "Đánh giá mã nguồn"
prompt = "Hãy review code trong {{1}}, tập trung vào: {{2*:chất lượng code và bug}}"

[[commands]]
name = "push"
description = "Đẩy code lên Git"
exec = "git push"

# =============================================================================
# Cấu hình DỰ ÁN 1 (Dùng Claude Code)
# =============================================================================

[[projects]]
name = "backend-claudecode"
# admin_from = "12345678" # ID người dùng có quyền chạy lệnh hệ thống (/shell)

[projects.agent]
type = "claudecode"

[projects.agent.options]
work_dir = "/path/to/your/backend"
mode = "default" # "default" (hỏi ý kiến) | "acceptEdits" | "bypassPermissions" (yolo)

# Cấu hình Nhà cung cấp API cho Claude
provider = "anthropic"

[[projects.agent.providers]]
name = "anthropic"
api_key = "sk-ant-xxx"

# Nền tảng nhắn tin: Feishu/Lark
[[projects.platforms]]
type = "feishu"
[projects.platforms.options]
app_id = "cli_xxx"
app_secret = "xxx"
allow_from = "*" # Cho phép tất cả người dùng hoặc danh sách ID phân tách bằng dấu phẩy

# =============================================================================
# Cấu hình DỰ ÁN 2 (Dùng Gemini CLI)
# =============================================================================

[[projects]]
name = "frontend-gemini"

[projects.agent]
type = "gemini"

[projects.agent.options]
work_dir = "/path/to/your/frontend"
mode = "yolo" # Tự động phê duyệt mọi thay đổi
cmd = "gemini"

[[projects.agent.providers]]
name = "google"
api_key = "AIzaSy..."

# Nền tảng nhắn tin: Telegram
[[projects.platforms]]
type = "telegram"
[projects.platforms.options]
token = "123456:ABC-DEF..."
allow_from = "*"

# =============================================================================
# Cấu hình DỰ ÁN 3 (Dùng Cursor Agent)
# =============================================================================

[[projects]]
name = "cursor-project"

[projects.agent]
type = "cursor"

[projects.agent.options]
work_dir = "/path/to/project"
mode = "force"

# Nền tảng nhắn tin: Discord
[[projects.platforms]]
type = "discord"
[projects.platforms.options]
token = "your-discord-token"
guild_id = "123456789" # ID Server để cập nhật lệnh gạch chéo nhanh hơn

# =============================================================================
# Cấu hình DỰ ÁN 4 (Dùng Codex/OpenAI)
# =============================================================================

[[projects]]
name = "codex-project"

[projects.agent]
type = "codex"

[projects.agent.options]
work_dir = "/path/to/project"
mode = "suggest"
model = "o3-mini"

[[projects.agent.providers]]
name = "openai"
api_key = "sk-xxx"

# Nền tảng nhắn tin: Slack
[[projects.platforms]]
type = "slack"
[projects.platforms.options]
bot_token = "xoxb-xxx"
app_token = "xapp-xxx"

# =============================================================================
# Cấu hình DỰ ÁN 5 (Dùng Qoder/iFlow/OpenCode)
# =============================================================================

# [[projects]]
# name = "qoder-project"
# [projects.agent]
# type = "qoder"
# [projects.agent.options]
