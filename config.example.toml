# mode = "default"

# =============================================================================
# Các tùy chọn bổ sung
# =============================================================================

# Danh sách từ cấm (Banned Words)
# banned_words = ["từ_khóa_1", "từ_khóa_2"]

# Biệt danh cho lệnh (Aliases)
[[aliases]]
name = "trợ_giúp"
command = "/help"

[[aliases]]
name = "trạng_thái"
command = "/status"